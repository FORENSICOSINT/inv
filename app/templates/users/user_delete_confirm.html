{% extends 'basic/base.html' %}
{% load static %}
{% block content %}
<div class="page-wrapper p-0 m-0">
	<div class="content">
		<div class="page-header">
			<div class="page-title">
				<h4>Delete User</h4>
				<h6>Confirm deletion of {{ user.username }}</h6>
			</div>
			<div class="page-btn">
				<a href="{% url 'user_detail_page' user.id %}" class="btn btn-secondary">
					<i class="ti ti-arrow-left me-1"></i>Cancel
				</a>
			</div>
		</div>

		<div class="card">
			<div class="card-body">
				<div class="alert alert-warning">
					<h5><i class="ti ti-alert-triangle me-2"></i>Warning</h5>
					<p>You are about to delete the user <strong>"{{ user.username }}"</strong>.</p>
					<p>This action cannot be undone.</p>
				</div>

				<form method="post">
					{% csrf_token %}
					
					<div class="form-group mb-3">
						<label>Action</label>
						<div class="form-check">
							<input class="form-check-input" type="radio" name="action" id="deactivate" value="deactivate" checked>
							<label class="form-check-label" for="deactivate">
								Deactivate (Recommended) - User will not be able to log in, but data is preserved
							</label>
						</div>
						<div class="form-check">
							<input class="form-check-input" type="radio" name="action" id="delete" value="delete">
							<label class="form-check-label" for="delete">
								Delete Permanently - User and all associated data will be removed
							</label>
						</div>
					</div>

					<div class="form-group mt-4">
						<button type="submit" class="btn btn-danger">
							<i class="ti ti-trash me-1"></i>Confirm
						</button>
						<a href="{% url 'user_detail_page' user.id %}" class="btn btn-secondary">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
