{% extends 'basic/base.html' %}
{% block content %}
<div class="card mt-3 p-4">
    <h4>Delete Stock Adjustment {{ adjustment.id }}</h4>
    <p>Are you sure you want to delete this adjustment? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'stock_adjustment_detail' adjustment.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
