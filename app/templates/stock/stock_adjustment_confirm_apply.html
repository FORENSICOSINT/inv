{% extends 'basic/base.html' %}
{% block content %}
<div class="card mt-3 p-4">
    <h4>Apply Stock Adjustment {{ adjustment.id }}</h4>
    <p>Are you sure you want to apply this adjustment? This will update inventory counts.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">Yes, apply</button>
        <a href="{% url 'stock_adjustment_detail' adjustment.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
